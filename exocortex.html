<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EXOCORTEX OVERDRIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#04060a; --bg2:#070b12;
  --acid:#c7ff38; --acid-dim:#7e9b2a;
  --cyan:#36f6ff; --mag:#ff3ea5;
  --grid:rgba(199,255,56,.07);
  --panel:rgba(199,255,56,.04);
  --line:rgba(199,255,56,.18);
  --txt:#dffbe0; --mut:#5d7257;
  --mono:"DM Mono",monospace; --disp:"Space Grotesk",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--txt); font-family:var(--mono);
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
/* reactive grid bg */
.grid-bg{
  position:fixed; inset:-2px; z-index:0;
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:46px 46px;
  transform:perspective(600px) rotateX(58deg) translateY(-12%) scale(2.2);
  transform-origin:center 40%;
  animation:gridflow 18s linear infinite;
  opacity:.9;
}
@keyframes gridflow{to{background-position:0 460px}}
.glow-orb{
  position:fixed; width:60vw; height:60vw; border-radius:50%; z-index:0;
  filter:blur(120px); opacity:.22; pointer-events:none;
  background:radial-gradient(circle,var(--acid),transparent 60%);
  top:-20vw; right:-15vw; animation:breathe 9s ease-in-out infinite;
}
.glow-orb.b{background:radial-gradient(circle,var(--cyan),transparent 60%);
  left:-18vw; bottom:-20vw; top:auto; right:auto; animation-delay:-4s; opacity:.16}
@keyframes breathe{50%{transform:scale(1.25)}}
/* scanlines + flicker */
.scan{position:fixed;inset:0;z-index:40;pointer-events:none;
  background:repeating-linear-gradient(transparent 0 2px,rgba(0,0,0,.22) 2px 4px);
  mix-blend-mode:multiply; animation:flick 6s steps(60) infinite}
@keyframes flick{0%,100%{opacity:.55}50%{opacity:.4}}
.vig{position:fixed;inset:0;z-index:41;pointer-events:none;
  box-shadow:inset 0 0 220px 40px #000; opacity:.7}

.app{position:relative;z-index:10;height:100%;display:flex;flex-direction:column;
  max-width:1000px;margin:0 auto;padding:0 16px}

/* header */
header{display:flex;align-items:center;gap:14px;padding:18px 4px 14px;border-bottom:1px solid var(--line)}
.logo{font-family:var(--disp);font-weight:700;letter-spacing:.18em;font-size:18px;
  color:var(--acid);text-shadow:0 0 16px var(--acid-dim);position:relative}
.logo::after{content:"OVERDRIVE";position:absolute;left:0;top:0;color:var(--mag);
  clip-path:inset(0 0 50% 0);transform:translate(2px,-1px);opacity:.0;animation:glitch 5s infinite}
@keyframes glitch{0%,92%,100%{opacity:0;transform:translate(0)}93%{opacity:.8;transform:translate(-3px,1px)}96%{opacity:.6;transform:translate(2px,-1px)}}
.dot{width:8px;height:8px;border-radius:50%;background:var(--acid);box-shadow:0 0 12px var(--acid);animation:pulse 1.4s infinite}
@keyframes pulse{50%{opacity:.3}}
.stat{margin-left:auto;font-size:11px;color:var(--mut);letter-spacing:.1em;text-align:right;line-height:1.5}
.stat b{color:var(--acid)}
.keybtn{background:none;border:1px solid var(--line);color:var(--mut);font-family:var(--mono);
  font-size:11px;padding:7px 11px;cursor:pointer;letter-spacing:.08em;transition:.2s}
.keybtn:hover{color:var(--acid);border-color:var(--acid);box-shadow:0 0 14px var(--acid-dim)}
.keybtn.live{color:var(--acid);border-color:var(--acid)}

/* chat */
.chat{flex:1;overflow-y:auto;padding:22px 4px;display:flex;flex-direction:column;gap:18px;scrollbar-width:thin;scrollbar-color:var(--acid-dim) transparent}
.chat::-webkit-scrollbar{width:6px}.chat::-webkit-scrollbar-thumb{background:var(--acid-dim)}
.msg{max-width:80%;padding:13px 16px;font-size:14px;line-height:1.65;white-space:pre-wrap;position:relative;border:1px solid var(--line)}
.msg.bot{align-self:flex-start;background:var(--panel);border-left:2px solid var(--acid);
  box-shadow:0 0 30px rgba(199,255,56,.05)}
.msg.bot::before{content:"◈ "attr(data-name);position:absolute;top:-9px;left:10px;font-size:9px;
  letter-spacing:.2em;color:var(--acid);background:var(--bg);padding:0 6px}
.msg.user{align-self:flex-end;background:rgba(54,246,255,.05);border-right:2px solid var(--cyan);color:#d6fbff}
.msg.user::before{content:"OPERATOR";position:absolute;top:-9px;right:10px;font-size:9px;
  letter-spacing:.2em;color:var(--cyan);background:var(--bg);padding:0 6px}
.cursor{display:inline-block;width:8px;height:15px;background:var(--acid);margin-left:2px;
  vertical-align:middle;animation:blink .9s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.think{align-self:flex-start;color:var(--mut);font-size:12px;letter-spacing:.1em;display:flex;gap:5px;align-items:center}
.think i{width:6px;height:6px;background:var(--acid);border-radius:50%;animation:tk 1s infinite}
.think i:nth-child(2){animation-delay:.2s}.think i:nth-child(3){animation-delay:.4s}
@keyframes tk{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}

/* input */
.bar{display:flex;gap:10px;padding:14px 0 22px;align-items:flex-end}
.field{flex:1;display:flex;align-items:center;border:1px solid var(--line);background:rgba(0,0,0,.4);
  padding:0 14px;transition:.2s}
.field:focus-within{border-color:var(--acid);box-shadow:0 0 22px var(--acid-dim)}
.field .pr{color:var(--acid);font-size:14px;margin-right:8px;user-select:none}
textarea{flex:1;background:none;border:none;color:var(--txt);font-family:var(--mono);font-size:14px;
  resize:none;outline:none;padding:14px 0;max-height:120px;line-height:1.5}
.send{background:var(--acid);color:#04060a;border:none;font-family:var(--disp);font-weight:700;
  letter-spacing:.1em;font-size:13px;padding:0 22px;height:50px;cursor:pointer;transition:.15s;
  clip-path:polygon(0 0,100% 0,100% 70%,90% 100%,0 100%)}
.send:hover{box-shadow:0 0 26px var(--acid);transform:translateY(-1px)}
.send:active{transform:translateY(0)}

/* key modal */
.modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.8);display:none;
  align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal.on{display:flex}
.box{width:min(440px,90vw);background:var(--bg2);border:1px solid var(--acid);padding:26px;
  box-shadow:0 0 60px var(--acid-dim)}
.box h3{font-family:var(--disp);color:var(--acid);letter-spacing:.12em;margin-bottom:8px;font-size:15px}
.box p{font-size:12px;color:var(--mut);line-height:1.6;margin-bottom:16px}
.box input{width:100%;background:#000;border:1px solid var(--line);color:var(--txt);font-family:var(--mono);
  padding:12px;font-size:13px;outline:none;margin-bottom:14px}
.box input:focus{border-color:var(--acid)}
.box .row{display:flex;gap:10px}
.box button{flex:1;padding:11px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;cursor:pointer;border:1px solid var(--line);background:none;color:var(--txt);transition:.2s}
.box button.go{background:var(--acid);color:#000;border-color:var(--acid);font-weight:500}
.box button:hover{border-color:var(--acid)}
.home{position:fixed;top:18px;left:18px;z-index:50;color:var(--mut);text-decoration:none;font-size:11px;letter-spacing:.1em;border:1px solid var(--line);padding:6px 10px}
.home:hover{color:var(--acid);border-color:var(--acid)}
</style>
</head>
<body>
<div class="grid-bg" id="grid"></div>
<div class="glow-orb"></div><div class="glow-orb b"></div>
<a class="home" href="index.html">← INDEX</a>

<div class="app">
  <header>
    <span class="dot"></span>
    <span class="logo" data-text="EXOCORTEX">EXOCORTEX</span>
    <button class="keybtn" id="keybtn">◇ OFFLINE BRAIN</button>
    <div class="stat">NODE <b>0x7F</b> · LATENCY <b id="lat">12ms</b><br>CORTEX OVERDRIVE v2.0</div>
  </header>
  <div class="chat" id="chat"></div>
  <div class="bar">
    <div class="field">
      <span class="pr">&gt;</span>
      <textarea id="inp" rows="1" placeholder="transmit to exocortex..."></textarea>
    </div>
    <button class="send" id="send">SEND ▸</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="box">
    <h3>◈ NEURAL UPLINK</h3>
    <p>Paste an Anthropic API key to run live on <b>claude-haiku-4-5</b>. Stored only in your browser (localStorage). Leave empty to use the offline brain.</p>
    <input id="keyinp" type="password" placeholder="sk-ant-..." autocomplete="off" />
    <div class="row">
      <button id="clr">CLEAR</button>
      <button class="go" id="save">CONNECT</button>
    </div>
  </div>
</div>

<script src="chat-engine.js"></script>
<script>
const chat=document.getElementById('chat'),inp=document.getElementById('inp'),
send=document.getElementById('send'),grid=document.getElementById('grid'),
keybtn=document.getElementById('keybtn'),modal=document.getElementById('modal');

const eng=ChatEngine.create({
  persona:'exocortex',
  onThinking(){showThink()},
  onToken(t){appendToken(t)},
  onDone(){hideThink();flashGrid()}
});

function refreshKeyBtn(){
  if(eng.hasKey()){keybtn.textContent='◆ LIVE · HAIKU';keybtn.classList.add('live')}
  else{keybtn.textContent='◇ OFFLINE BRAIN';keybtn.classList.remove('live')}
}
refreshKeyBtn();

function addMsg(role,text){
  const d=document.createElement('div');d.className='msg '+role;
  if(role==='bot')d.dataset.name=eng.name;
  d.textContent=text;chat.appendChild(d);scroll();return d;
}
let streamEl=null;
function appendToken(t){
  if(!streamEl){streamEl=addMsg('bot','');streamEl.innerHTML='';}
  streamEl.append(document.createTextNode(t));scroll();
}
let thinkEl=null;
function showThink(){
  thinkEl=document.createElement('div');thinkEl.className='think';
  thinkEl.innerHTML='EXOCORTEX PROCESSING <i></i><i></i><i></i>';
  chat.appendChild(thinkEl);scroll();
}
function hideThink(){if(thinkEl){thinkEl.remove();thinkEl=null}streamEl=null}
function scroll(){chat.scrollTop=chat.scrollHeight}
function flashGrid(){grid.style.opacity=1.4;setTimeout(()=>grid.style.opacity=.9,160);
  document.getElementById('lat').textContent=(8+Math.floor(Math.random()*30))+'ms'}

async function go(){
  const v=inp.value.trim();if(!v)return;
  addMsg('user',v);inp.value='';inp.style.height='auto';
  send.disabled=true;await eng.send(v);send.disabled=false;inp.focus();
}
send.onclick=go;
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go()}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px'});

// modal
keybtn.onclick=()=>{document.getElementById('keyinp').value='';modal.classList.add('on')};
modal.onclick=e=>{if(e.target===modal)modal.classList.remove('on')};
document.getElementById('save').onclick=()=>{eng.setKey(document.getElementById('keyinp').value);refreshKeyBtn();modal.classList.remove('on')};
document.getElementById('clr').onclick=()=>{eng.setKey('');refreshKeyBtn();modal.classList.remove('on')};

// boot sequence
(async()=>{
  const boot=['> initializing cortex...','> loading memory shards [████████] 100%','> neural link established.',eng.greet];
  for(const line of boot){addMsg('bot',line);await new Promise(r=>setTimeout(r,420))}
})();
</script>
</body>
</html>
